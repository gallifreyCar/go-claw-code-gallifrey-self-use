# Go-Claw-Code 配置示例
# 复制到 ~/.config/go-claw-code/config.yaml

# API 配置
api:
  # 提供商: anthropic 或 openai
  provider: anthropic

  # Anthropic API 配置
  anthropic:
    # 支持环境变量: ${ANTHROPIC_API_KEY}
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-6
    base_url: https://api.anthropic.com

  # OpenAI 兼容 API 配置
  openai:
    api_key: ${OPENAI_API_KEY}
    model: gpt-4
    base_url: https://api.openai.com/v1
    # 可配置其他兼容 API，如:
    # base_url: https://api.deepseek.com/v1
    # model: deepseek-chat

# 权限模式
# ask: 每次询问用户
# allow: 自动允许所有操作
# deny: 自动拒绝所有操作
permission: ask

# 日志配置
log:
  level: info  # debug, info, warn, error
  format: text # text, json

# 记忆系统
memory:
  enabled: true
  path: ~/.local/share/go-claw-code/memory

# Agent 配置
agent:
  max_iterations: 100
  timeout: 10m
